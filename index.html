<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card-hover:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--border:#334155;--hl:#f8fafc;--read-card:#151e2e;--read-text:#475569;--green:#34d399}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.hd{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.95);border-bottom:1px solid var(--border);padding:16px 20px 12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hd h1{font-size:20px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hd h1 .ct{font-size:13px;color:var(--muted);font-weight:400;margin-left:auto}
.sb{position:relative;margin-bottom:10px}
.sb input{width:100%;padding:10px 14px 10px 38px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.sb input:focus{border-color:var(--accent)}
.sb::before{content:"\1F50D";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.tb{display:flex;gap:6px;margin-bottom:10px}
.tb button{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tb button.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.fl{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fl::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.fb.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.sr{display:flex;gap:8px;margin-bottom:10px}
.sr select{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;-webkit-appearance:none;appearance:none}
.st{padding:8px 20px;font-size:13px;color:var(--muted)}
.cn{padding:8px 16px 100px}
.cl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:18px 4px 8px}
.cd{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid transparent;transition:all .15s;display:flex;gap:12px;align-items:flex-start}
.cd.read{background:var(--read-card);opacity:.55}
.cd.read .hl{color:var(--read-text);text-decoration:line-through}
.cd.read .au,.cd.read .dt,.cd.read .tx{opacity:.5}
.ck{flex-shrink:0;width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.ck:hover{border-color:var(--green)}
.ck.done{background:var(--green);border-color:var(--green)}
.ck.done::after{content:"\2713";color:var(--bg);font-size:13px;font-weight:700}
.cd-body{flex:1;min-width:0}
.cd-link{text-decoration:none;color:inherit;display:block}
.ct2{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.au{font-size:12px;color:var(--accent);font-weight:600}
.au span{color:var(--muted);font-weight:400}
.tg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.retag{font-size:10px;padding:2px 6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;margin-left:4px;transition:all .15s}
.retag:hover{border-color:var(--accent);color:var(--accent)}
.hl{font-size:15px;font-weight:600;line-height:1.45;color:var(--hl);margin-bottom:4px}
.tx{font-size:13px;line-height:1.45;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dt{font-size:11px;color:var(--muted);margin-top:6px;opacity:.6}
.tg.code{background:#22d3ee18;color:#22d3ee}
.tg.ai{background:#818cf818;color:#818cf8}
.tg.pm{background:#f472b618;color:#f472b6}
.tg.career{background:#34d39918;color:#34d399}
.tg.learn{background:#fbbf2418;color:#fbbf24}
.tg.tools{background:#fb923c18;color:#fb923c}
.tg.biz{background:#a78bfa18;color:#a78bfa}
.tg.fun{background:#f8717118;color:#f87171}
.tg.misc{background:#64748b18;color:#64748b}
.em{text-align:center;padding:60px 20px;color:var(--muted)}.em span{font-size:40px;display:block;margin-bottom:12px}
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-box{background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:340px;max-height:70vh;overflow-y:auto}
.modal-box h3{font-size:16px;margin-bottom:14px;color:var(--hl)}
.modal-box .opt{padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;margin-bottom:6px;transition:all .15s;border:1px solid var(--border)}
.modal-box .opt:hover,.modal-box .opt.sel{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.modal-box .close-btn{margin-top:12px;padding:10px;width:100%;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px}
@media(min-width:768px){.cn{max-width:700px;margin:0 auto}.hd{padding:20px calc(50% - 330px) 14px}.st{padding:8px calc(50% - 330px)}}
</style>
</head>

const CN={all:"All",learn:"🎓 Learning",ai:"🤖 Agents",code:"🛠 Coding",pm:"📊 PM",career:"💼 Career",tools:"⚙️ Tools",biz:"💰 Business",fun:"🎨 Fun",misc:"📌 Other"};
const CATS=["learn","ai","code","pm","career","tools","biz","fun","misc"];
function getRead(){try{return JSON.parse(localStorage.getItem('bk_read')||'{}');}catch(e){return {};}}
function setRead(r){localStorage.setItem('bk_read',JSON.stringify(r));}
function getTags(){try{return JSON.parse(localStorage.getItem('bk_tags')||'{}');}catch(e){return {};}}
function setTags(t){localStorage.setItem('bk_tags',JSON.stringify(t));}
let readState=getRead(),customTags=getTags();
let ac="all",vw="all",sortBy="newest",retagId=null;
const qi=document.getElementById("q"),cn=document.getElementById("cn"),st=document.getElementById("st"),totalEl=document.getElementById("total");
function getCat(b){return customTags[b.i]||b.c;}
function R(){
const q=qi.value.toLowerCase().trim();
let f=B.map(b=>({...b,cc:getCat(b)}));
if(vw==="unread")f=f.filter(b=>!readState[b.i]);
if(vw==="read")f=f.filter(b=>readState[b.i]);
if(ac!=="all")f=f.filter(b=>b.cc===ac);
if(q)f=f.filter(b=>b.s.toLowerCase().includes(q)||b.x.toLowerCase().includes(q)||b.a.toLowerCase().includes(q)||b.h.toLowerCase().includes(q));
if(sortBy==="oldest")f=f.reverse();
if(sortBy==="author")f.sort((a,b)=>a.a.localeCompare(b.a));
const readCount=B.filter(b=>readState[b.i]).length;
st.textContent=f.length+" bookmark"+(f.length!==1?"s":"");
totalEl.textContent=readCount+"/298 read";
if(!f.length){cn.innerHTML='<div class="em"><span>🔍</span>No bookmarks found</div>';return;}
const g={};f.forEach(b=>{const c=b.cc;if(!g[c])g[c]=[];g[c].push(b);});
let h="";
CATS.forEach(c=>{
if(!g[c])return;
if(ac==="all")h+='<div class="cl">'+CN[c]+" ("+g[c].length+")</div>";
g[c].forEach(b=>{
const isRead=readState[b.i];
h+='<div class="cd'+(isRead?' read':'')+'">';
h+='<div class="ck'+(isRead?' done':'')+'" data-read="'+b.i+'"></div>';
h+='<div class="cd-body"><a class="cd-link" href="'+b.l+'" target="_blank" rel="noopener">';
h+='<div class="ct2"><span class="au">'+b.a+' <span>'+b.h+'</span></span>';
h+='<span><span class="tg '+b.cc+'">'+CN[b.cc].split(" ").pop()+'</span>';
h+='<button class="retag" data-retag="'+b.i+'">✏️</button></span></div>';
h+='<div class="hl">'+b.s+'</div>';
if(b.x)h+='<div class="tx">'+b.x+'</div>';
h+='<div class="dt">'+b.d+'</div>';
h+='</a></div></div>';
});
});
cn.innerHTML=h;
}
function toggleRead(id){if(readState[id])delete readState[id];else readState[id]=1;setRead(readState);R();}
function openModal(id){retagId=id;const b=B.find(x=>x.i===id);const cur=getCat(b);const el=document.getElementById("modal-opts");el.innerHTML=CATS.map(c=>'<div class="opt'+(c===cur?' sel':'')+'" data-cat="'+c+'">'+CN[c]+'</div>').join("");document.getElementById("modal").classList.add("show");}
function closeModal(){document.getElementById("modal").classList.remove("show");retagId=null;}
function reTag(cat){if(retagId){const b=B.find(x=>x.i===retagId);if(cat===b.c)delete customTags[retagId];else customTags[retagId]=cat;setTags(customTags);}closeModal();R();}
document.getElementById("tb").addEventListener("click",e=>{const btn=e.target.closest("button");if(!btn)return;document.querySelectorAll("#tb button").forEach(x=>x.classList.remove("on"));btn.classList.add("on");vw=btn.dataset.v;R();});
document.getElementById("fl").addEventListener("click",e=>{const btn=e.target.closest(".fb");if(!btn)return;document.querySelectorAll(".fb").forEach(x=>x.classList.remove("on"));btn.classList.add("on");ac=btn.dataset.c;R();});
document.getElementById("sort").addEventListener("change",e=>{sortBy=e.target.value;R();});
qi.addEventListener("input",R);
cn.addEventListener("click",e=>{const ck=e.target.closest("[data-read]");if(ck){e.preventDefault();e.stopPropagation();toggleRead(ck.dataset.read);return;}const rt=e.target.closest("[data-retag]");if(rt){e.preventDefault();e.stopPropagation();openModal(rt.dataset.retag);return;}});
document.getElementById("modal-opts").addEventListener("click",e=>{const opt=e.target.closest("[data-cat]");if(opt)reTag(opt.dataset.cat);});
document.getElementById("modal").addEventListener("click",e=>{if(e.target.classList.contains("modal"))closeModal();});
R();
</script>
</body>
</html>
