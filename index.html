const catNames={all:"All",learn:"🎓 Learning",ai:"🤖 Agents",code:"🛠 Coding",pm:"📊 PM",career:"💼 Career",tools:"⚙️ Tools",biz:"💰 Business",fun:"🎨 Fun",misc:"📌 Other"};
let activeCat="all";
const searchInput=document.getElementById("search"),container=document.getElementById("container"),statsEl=document.getElementById("stats");
function render(){const q=searchInput.value.toLowerCase().trim();let filtered=bookmarks;if(activeCat!=="all")filtered=filtered.filter(b=>b.cat===activeCat);if(q)filtered=filtered.filter(b=>b.summary.toLowerCase().includes(q)||b.text.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||b.handle.toLowerCase().includes(q)||b.tag.toLowerCase().includes(q));statsEl.textContent=filtered.length+" bookmark"+(filtered.length!==1?"s":"");if(!filtered.length){container.innerHTML='<div class="empty"><span>🔍</span>No bookmarks found</div>';return}const groups={};filtered.forEach(b=>{if(!groups[b.cat])groups[b.cat]=[];groups[b.cat].push(b)});let html="";const catOrder=["learn","ai","code","pm","career","tools","biz","fun","misc"];catOrder.forEach(cat=>{if(!groups[cat])return;if(activeCat==="all")html+='<div class="category-label">'+catNames[cat]+" ("+groups[cat].length+")</div>";groups[cat].forEach(b=>{html+='<a class="card" href="'+b.link+'" target="_blank" rel="noopener"><div class="card-top"><span class="card-author">'+b.author+' <span style="color:var(--text-muted);font-weight:400">'+b.handle+'</span></span><span class="card-tag tag-'+b.cat+'">'+b.tag+'</span></div><div class="card-summary">'+b.summary+'</div><div class="card-text">'+b.text+'</div><div class="card-date">'+b.date+"</div></a>"})});container.innerHTML=html}
document.getElementById("filters").addEventListener("click",e=>{const btn=e.target.closest(".filter-btn");if(!btn)return;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");activeCat=btn.dataset.cat;render()});
searchInput.addEventListener("input",render);render();
