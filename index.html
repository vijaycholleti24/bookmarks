*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card-hover:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--border:#334155;--hl:#f8fafc}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.hd{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.92);border-bottom:1px solid var(--border);padding:16px 20px 12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hd h1{font-size:20px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hd h1 .ct{font-size:13px;color:var(--muted);font-weight:400;margin-left:auto}
.sb{position:relative;margin-bottom:10px}
.sb input{width:100%;padding:10px 14px 10px 38px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.sb input:focus{border-color:var(--accent)}
.sb::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.fl{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fl::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.fb.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.st{padding:8px 20px;font-size:13px;color:var(--muted)}
.cn{padding:8px 16px 100px}
.cl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:18px 4px 8px}
a.cd{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid transparent;transition:all .15s;cursor:pointer;text-decoration:none;display:block;color:inherit}
a.cd:active{border-color:var(--accent);background:var(--card-hover);transform:scale(.99)}
.ct2{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.au{font-size:12px;color:var(--accent);font-weight:600}
.au span{color:var(--muted);font-weight:400}
.tg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.hl{font-size:15px;font-weight:600;line-height:1.45;color:var(--hl)}
.dt{font-size:11px;color:var(--muted);margin-top:8px;opacity:.6}
.tg.code{background:#22d3ee18;color:#22d3ee}
.tg.ai{background:#818cf818;color:#818cf8}
.tg.pm{background:#f472b618;color:#f472b6}
.tg.career{background:#34d39918;color:#34d399}
.tg.learn{background:#fbbf2418;color:#fbbf24}
.tg.tools{background:#fb923c18;color:#fb923c}
.tg.biz{background:#a78bfa18;color:#a78bfa}
.tg.fun{background:#f8717118;color:#f87171}
.tg.misc{background:#64748b18;color:#64748b}
.em{text-align:center;padding:60px 20px;color:var(--muted)}.em span{font-size:40px;display:block;margin-bottom:12px}
@media(min-width:768px){.cn{max-width:700px;margin:0 auto}.hd{padding:20px calc(50% - 330px) 14px}.st{padding:8px calc(50% - 330px)}}
</style>
